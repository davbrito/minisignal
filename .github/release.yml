# GitHub-native changelog configuration
# Controls how release notes are auto-generated from merged PRs and issues.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🧹 Maintenance
      labels:
        - chore
        - dependencies
        - refactor
        - ci
    - title: 📖 Documentation
      labels:
        - documentation
        - docs
    - title: 🧪 Testing
      labels:
        - test
        - testing
    - title: Other Changes
      labels:
        - "*"
